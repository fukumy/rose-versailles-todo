<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rose of Versailles TODO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Noto+Serif+JP:wght@200..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-ornament"></div>
    
    <div class="container">
        <!-- コーナー装飾 -->
        <svg class="corner top-left" viewBox="0 0 100 100">
            <path d="M0,0 L100,0 L100,10 L10,10 L10,100 L0,100 Z" opacity="0.1"/>
            <path d="M15,15 Q40,15 40,40" fill="none" stroke="currentColor" stroke-width="2"/>
            <circle cx="15" cy="15" r="4" fill="currentColor"/>
            <path d="M15,15 Q15,40 40,40" fill="none" stroke="currentColor" stroke-width="2"/>
        </svg>
        <svg class="corner top-right" viewBox="0 0 100 100">
            <path d="M15,15 Q40,15 40,40" fill="none" stroke="currentColor" stroke-width="2"/>
            <circle cx="15" cy="15" r="4" fill="currentColor"/>
            <path d="M15,15 Q15,40 40,40" fill="none" stroke="currentColor" stroke-width="2"/>
        </svg>
        <svg class="corner bottom-left" viewBox="0 0 100 100">
            <path d="M15,15 Q40,15 40,40" fill="none" stroke="currentColor" stroke-width="2"/>
            <circle cx="15" cy="15" r="4" fill="currentColor"/>
            <path d="M15,15 Q15,40 40,40" fill="none" stroke="currentColor" stroke-width="2"/>
        </svg>
        <svg class="corner bottom-right" viewBox="0 0 100 100">
            <path d="M15,15 Q40,15 40,40" fill="none" stroke="currentColor" stroke-width="2"/>
            <circle cx="15" cy="15" r="4" fill="currentColor"/>
            <path d="M15,15 Q15,40 40,40" fill="none" stroke="currentColor" stroke-width="2"/>
        </svg>

        <header>
            <h1 class="title">La Rose de Versailles</h1>
            <p class="subtitle">~ 麗しき日々の備忘録 ~</p>
        </header>

        <section class="todo-input-section">
            <div class="input-wrapper">
                <input type="text" id="todo-input" placeholder="新たな誓いをここに..." aria-label="新しいTODOを入力">
                <button id="add-btn" aria-label="追加">
                    <span class="btn-icon">🌹</span>
                </button>
            </div>
        </section>

        <section class="todo-list-section">
            <ul id="todo-list">
                <!-- TODOアイテムがここに追加されます -->
            </ul>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
